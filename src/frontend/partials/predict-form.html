<section class="card">
  <div class="section-head">
    <h2>Enter features</h2>
    <p class="muted">No raw JSON input. Use named feature rows.</p>
  </div>

  <form id="predict-form" class="stack">
    <div id="feature-rows" class="feature-rows">
      <div class="feature-row" data-feature-row>
        <input class="input" name="feature_name" placeholder="Feature name" autocomplete="off" />
        <input class="input" name="feature_value" placeholder="Value" autocomplete="off" />
        <button type="button" class="button ghost" data-remove-row>Remove</button>
      </div>
    </div>

    <template id="feature-row-template">
      <div class="feature-row" data-feature-row>
        <input class="input" name="feature_name" placeholder="Feature name" autocomplete="off" />
        <input class="input" name="feature_value" placeholder="Value" autocomplete="off" />
        <button type="button" class="button ghost" data-remove-row>Remove</button>
      </div>
    </template>

    <div class="button-row">
      <button type="button" class="button secondary" id="add-feature">Add feature</button>
      <button type="submit" class="button">Predict</button>
    </div>
  </form>
</section>
