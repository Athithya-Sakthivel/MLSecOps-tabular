<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Predict · Tabular ML Inference</title>
  <link rel="stylesheet" href="/static/css/tailwind.v1.css" />
  <script src="/static/js/htmx.v1.js" defer></script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">
  <div hx-get="/partials/navbar.html" hx-trigger="load" hx-swap="outerHTML"></div>

  <main class="mx-auto max-w-5xl px-4 py-10">
    <section class="rounded-2xl bg-white p-6 shadow-sm ring-1 ring-slate-200">
      <div class="flex items-center justify-between gap-4">
        <div>
          <h1 class="text-2xl font-semibold tracking-tight">Predict</h1>
          <p class="mt-2 text-slate-600">
            Fill the form and submit. No raw JSON input.
          </p>
        </div>
        <a href="https://auth.athithya.site/login?next=/predict.html"
           class="rounded-xl border border-slate-300 bg-white px-4 py-2">
          Login
        </a>
      </div>

      <div class="mt-6" hx-get="/partials/predict-form.html" hx-trigger="load" hx-swap="innerHTML">
        Loading form…
      </div>

      <div id="predict-result" class="mt-6"></div>
    </section>
  </main>
</body>
</html>
