apiVersion: apps/v1
kind: Deployment
metadata:
  name: iceberg-rest
  namespace: default
  labels:
    app: iceberg-rest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: iceberg-rest
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: iceberg-rest
    spec:
      serviceAccountName: iceberg-rest-sa
      terminationGracePeriodSeconds: 30
      securityContext:
        seccompProfile:
          type: RuntimeDefault
        fsGroup: 0
        fsGroupChangePolicy: OnRootMismatch
      initContainers:
        - name: copy-config
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - cp -a /config/. /conf/ && chmod -R ug+rwX /conf || true
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 0
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: conf
              mountPath: /conf
            - name: tmp
              mountPath: /tmp
      containers:
        - name: grav
          image: ghcr.io/athithya-sakthivel/iceberg-rest-gravitino-postgres@sha256:bb2ac1c0328a94b65834aa0bae9e863baf8aaee7557810e7b79c71f3537d13ea
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 9001
          env:
            - name: GRAVITINO_VERSION
              value: "1.1.0"
            - name: GRAVITINO_ICEBERG_REST_HTTP_PORT
              value: "9001"
            - name: GRAVITINO_IO_IMPL
              value: "org.apache.iceberg.aws.s3.S3FileIO"
            - name: GRAVITINO_CATALOG_BACKEND
              value: "jdbc"
            - name: GRAVITINO_URI
              value: "jdbc:postgresql://postgres-pooler.default.svc.cluster.local:5432/iceberg_catalogue_metadata"
            - name: GRAVITINO_WAREHOUSE
              value: "s3://e2e-mlops-data-681802563986/iceberg/warehouse/"
            - name: GRAVITINO_JDBC_DRIVER
              value: "org.postgresql.Driver"
            - name: GRAVITINO_JDBC_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-cluster-app
                  key: username
            - name: GRAVITINO_JDBC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-cluster-app
                  key: password
            - name: GRAVITINO_S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: iceberg-storage-credentials
                  key: AWS_ACCESS_KEY_ID
            - name: GRAVITINO_S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: iceberg-storage-credentials
                  key: AWS_SECRET_ACCESS_KEY
            - name: GRAVITINO_S3_REGION
              value: "ap-south-1"
            - name: GRAVITINO_S3_ENDPOINT
              value: ""
            - name: GRAVITINO_S3_PATH_STYLE_ACCESS
              value: "false"
            - name: ICEBERG_REST_AUTH_TYPE
              value: "basic"
            - name: ICEBERG_REST_USER
              valueFrom:
                secretKeyRef:
                  name: iceberg-rest-auth
                  key: user
            - name: ICEBERG_REST_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: iceberg-rest-auth
                  key: password
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 0
            capabilities:
              drop:
                - ALL
          startupProbe:
            tcpSocket:
              port: 9001
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 120
          readinessProbe:
            tcpSocket:
              port: 9001
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 12
          livenessProbe:
            tcpSocket:
              port: 9001
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          volumeMounts:
            - name: conf
              mountPath: /root/gravitino-iceberg-rest-server/conf
              readOnly: false
            - name: logs
              mountPath: /root/gravitino-iceberg-rest-server/logs
            - name: tmp
              mountPath: /tmp
            - name: tmp
              mountPath: /var/tmp

      volumes:
        - name: config
          configMap:
            name: iceberg-rest-conf
        - name: conf
          emptyDir: {}
        - name: logs
          emptyDir: {}
        - name: tmp
          emptyDir: {}

