apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: inference
  labels:
    app.kubernetes.io/name: cloudflared
    app.kubernetes.io/component: tunnel
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: cloudflared
      app.kubernetes.io/component: tunnel
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cloudflared
        app.kubernetes.io/component: tunnel
      annotations:
        cloudflared/config-checksum: da9aac1dc38552f894f382afd1f5619c20bbfcf30e274e5dc440b89262133eab
    spec:
      serviceAccountName: cloudflared-sa
      terminationGracePeriodSeconds: 30
      securityContext:
        sysctls:
        - name: net.ipv4.ping_group_range
          value: 65532 65532
      containers:
      - name: cloudflared
        image: cloudflare/cloudflared:2026.3.0
        imagePullPolicy: IfNotPresent
        command:
        - cloudflared
        args:
        - tunnel
        - --no-autoupdate
        - --loglevel
        - info
        - --protocol
        - http2
        - --metrics
        - 0.0.0.0:2000
        - run
        env:
        - name: TUNNEL_TOKEN
          valueFrom:
            secretKeyRef:
              name: cloudflared-token
              key: token
        ports:
        - name: metrics
          containerPort: 2000
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
        readinessProbe:
          httpGet:
            path: /ready
            port: 2000
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /ready
            port: 2000
          initialDelaySeconds: 15
          periodSeconds: 15
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 65532
          runAsGroup: 65532
          capabilities:
            drop:
            - ALL
