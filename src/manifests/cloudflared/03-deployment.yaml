apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: inference
  labels:
    app.kubernetes.io/name: cloudflared
    app.kubernetes.io/component: tunnel
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cloudflared
      app.kubernetes.io/component: tunnel
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cloudflared
        app.kubernetes.io/component: tunnel
      annotations:
        cloudflared/config-checksum: c61c4df22a1c82861588915091b4fa0b8f8fc8e47566d674681e58af89120612
    spec:
      serviceAccountName: cloudflared-sa
      terminationGracePeriodSeconds: 60
      securityContext:
        sysctls:
        - name: net.ipv4.ping_group_range
          value: 65532 65532
      volumes:
      - name: cloudflared-config
        configMap:
          name: cloudflared-config
          items:
          - key: config.yaml
            path: config.yaml
      containers:
      - name: cloudflared
        image: docker.io/cloudflare/cloudflared:2026.3.0@sha256:6b599ca3e974349ead3286d178da61d291961182ec3fe9c505e1dd02c8ac31b0
        imagePullPolicy: IfNotPresent
        command:
        - cloudflared
        args:
        - tunnel
        - --no-autoupdate
        - --loglevel
        - info
        - --protocol
        - http2
        - --metrics
        - 0.0.0.0:2000
        - --config
        - /etc/cloudflared/config.yaml
        - run
        env:
        - name: TUNNEL_TOKEN
          valueFrom:
            secretKeyRef:
              name: cloudflared-token
              key: token
        ports:
        - name: metrics
          containerPort: 2000
        volumeMounts:
        - name: cloudflared-config
          mountPath: /etc/cloudflared
          readOnly: true
        startupProbe:
          httpGet:
            path: /ready
            port: 2000
          periodSeconds: 5
          failureThreshold: 36
          timeoutSeconds: 1
        readinessProbe:
          httpGet:
            path: /ready
            port: 2000
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 3
          timeoutSeconds: 1
        livenessProbe:
          httpGet:
            path: /ready
            port: 2000
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 3
          timeoutSeconds: 1
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 65532
          runAsGroup: 65532
          capabilities:
            drop:
            - ALL
