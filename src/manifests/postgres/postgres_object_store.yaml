apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: pg-backup-store
  namespace: default
spec:
  configuration:
    destinationPath: s3://e2e-mlops-data-681802563986/postgres_backups/local-dev/
    wal:
      compression: gzip
    data:
      compression: gzip
    s3Credentials:
      accessKeyId:
        name: aws-creds
        key: ACCESS_KEY_ID
      secretAccessKey:
        name: aws-creds
        key: ACCESS_SECRET_KEY
  retentionPolicy: 30d
