apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: inference
  labels:
    app.kubernetes.io/name: auth-service
    app.kubernetes.io/managed-by: auth-service
    app.kubernetes.io/component: auth
    app.kubernetes.io/part-of: auth-svc
spec:
  replicas: 2
  revisionHistoryLimit: 3
  progressDeadlineSeconds: 600
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: auth-service
      app.kubernetes.io/component: auth
  template:
    metadata:
      labels:
        app.kubernetes.io/name: auth-service
        app.kubernetes.io/managed-by: auth-service
        app.kubernetes.io/component: auth
        app.kubernetes.io/part-of: auth-svc
        app.kubernetes.io/version: v1
      annotations:
        auth-service.io/config-checksum: 6bd130f3650b8823849ae151c10219f9f85e01e97378c839ebe73686370e5366
    spec:
      serviceAccountName: auth-sa
      automountServiceAccountToken: false
      tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
      - key: node-role.kubernetes.io/master
        operator: Exists
        effect: NoSchedule
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: auth-service
            app.kubernetes.io/component: auth
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 30
      volumes:
      - name: tmp
        emptyDir: {}
      containers:
      - name: auth
        image: ghcr.io/athithya-sakthivel/auth-service:2026-04-19-11-56--bc1e4f5@sha256:a467044687dd8a0375c11ed1f04b750f05295650c60f264cd20ec1e5f4de074c
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        env:
        - name: APP_NAME
          value: auth-service
        - name: SERVICE_NAME
          value: auth-service
        - name: SERVICE_VERSION
          value: v1
        - name: ENVIRONMENT
          value: production
        - name: DEPLOYMENT_ENVIRONMENT
          value: production
        - name: K8S_CLUSTER_NAME
          value: production-cluster
        - name: APP_BASE_URL
          value: https://auth.api.athithya.site
        - name: AUTH_VALIDATE_ROUTE_PATH
          value: /validate
        - name: AUTH_ME_ROUTE_PATH
          value: /me
        - name: POSTGRES_DSN
          valueFrom:
            secretKeyRef:
              name: auth-secrets
              key: POSTGRES_DSN
        - name: POSTGRES_MIN_SIZE
          value: '1'
        - name: POSTGRES_MAX_SIZE
          value: '10'
        - name: SESSION_COOKIE_NAME
          value: auth_session
        - name: SESSION_TTL_SECONDS
          value: '86400'
        - name: AUTH_TX_TTL_SECONDS
          value: '600'
        - name: SESSION_COOKIE_SECURE
          value: 'true'
        - name: SESSION_COOKIE_SAMESITE
          value: strict
        - name: SESSION_COOKIE_PATH
          value: /
        - name: SESSION_COOKIE_DOMAIN
          value: ''
        - name: GOOGLE_CLIENT_ID
          value: 1055484429496-va3dpg9qpfq36vkh1nfn0hnrvrsfav2k.apps.googleusercontent.com
        - name: GOOGLE_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: auth-secrets
              key: GOOGLE_CLIENT_SECRET
        - name: MS_CLIENT_ID
          value: 0d390f2e-97ad-44c6-ac34-9b6574310713
        - name: MS_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: auth-secrets
              key: MS_CLIENT_SECRET
        - name: MS_TENANT_ID
          value: b8a65a11-9d1c-4d48-b9f6-dabfc67f2e4b
        - name: GOOGLE_ALLOWED_DOMAINS
          value: company.com,gmail.com
        - name: MICROSOFT_ALLOWED_TENANT_IDS
          value: b8a65a11-9d1c-4d48-b9f6-dabfc67f2e4b
        - name: MICROSOFT_ALLOWED_DOMAINS
          value: outlook.com, company.com, hotmail.com
        - name: METRICS_ENABLED
          value: 'true'
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: http://signoz-otel-collector.signoz.svc.cluster.local:4317
        - name: OTEL_TRACES_SAMPLER
          value: parentbased_traceidratio
        - name: OTEL_TRACES_SAMPLER_ARG
          value: '0.1'
        - name: OTEL_TIMEOUT_SECONDS
          value: '10.0'
        - name: OTEL_METRIC_EXPORT_INTERVAL_MS
          value: '15000'
        - name: OTEL_METRIC_EXPORT_TIMEOUT_MS
          value: '10000'
        - name: LOG_LEVEL
          value: INFO
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1024Mi
        startupProbe:
          httpGet:
            path: /healthz
            port: 8000
            scheme: HTTP
          initialDelaySeconds: 0
          timeoutSeconds: 2
          periodSeconds: 5
          failureThreshold: 60
          successThreshold: 1
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8000
            scheme: HTTP
          initialDelaySeconds: 0
          timeoutSeconds: 2
          periodSeconds: 10
          failureThreshold: 6
          successThreshold: 1
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8000
            scheme: HTTP
          initialDelaySeconds: 0
          timeoutSeconds: 2
          periodSeconds: 5
          failureThreshold: 6
          successThreshold: 1
