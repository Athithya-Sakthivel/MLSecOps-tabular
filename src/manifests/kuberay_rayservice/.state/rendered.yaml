---
apiVersion: v1
kind: Namespace
metadata:
  name: inference
  labels:
    app.kubernetes.io/name: tabular-inference
    app.kubernetes.io/managed-by: inference-service
    app.kubernetes.io/component: inference
---
apiVersion: ray.io/v1
kind: RayService
metadata:
  name: tabular-inference
  namespace: inference
  labels:
    app.kubernetes.io/name: tabular-inference
    app.kubernetes.io/managed-by: inference-service
    app.kubernetes.io/component: inference
  annotations:
    inference-service.io/auth-mode: static
spec:
  serviceUnhealthySecondThreshold: 300
  deploymentUnhealthySecondThreshold: 300
  rayClusterConfig:
    rayVersion: 2.54.1
    enableInTreeAutoscaling: true
    autoscalerOptions:
      version: v2
      idleTimeoutSeconds: 60
    headGroupSpec:
      serviceType: ClusterIP
      rayStartParams:
        dashboard-host: 0.0.0.0
        include-dashboard: 'true'
        num-cpus: '0'
      template:
        spec:
          securityContext: &id001
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
          terminationGracePeriodSeconds: 30
          volumes: &id002
          - name: model-cache
            emptyDir: {}
          - name: tmp
            emptyDir: {}
          containers:
          - name: ray-head
            image: ghcr.io/athithya-sakthivel/tabular-inference-service:2026-04-15-06-12--b2617e3@sha256:3615562548755e906ad17945518267cfadbac7bdaacc5a76fc6ebd4dfbcfd6f4
            imagePullPolicy: IfNotPresent
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                - ALL
              readOnlyRootFilesystem: true
            resources:
              requests:
                cpu: '1'
                memory: 4Gi
              limits:
                cpu: '1'
                memory: 4Gi
            volumeMounts:
            - name: model-cache
              mountPath: /mlsecops
            - name: tmp
              mountPath: /tmp
            env: &id003
            - name: DEPLOYMENT_PROFILE
              value: prod
            - name: OTEL_SERVICE_NAME
              value: tabular-inference
            - name: SERVICE_VERSION
              value: v1
            - name: DEPLOYMENT_ENVIRONMENT
              value: prod
            - name: K8S_CLUSTER_NAME
              value: production-cluster
            - name: MODEL_URI
              value: s3://e2e-mlops-data-681802563986/model-artifacts/trip_eta_lgbm_v1/bceb2eb9-e373-4c44-91e5-abde147fec8b/2025-01-06
            - name: MODEL_VERSION
              value: v1
            - name: MODEL_SHA256
              value: 29505278adb825a2f79812221b5d3a245145e140973d0354b74e278b50811976
            - name: MODEL_INPUT_NAME
              value: input
            - name: MODEL_OUTPUT_NAMES
              value: variable
            - name: FEATURE_ORDER
              value: pickup_hour,pickup_dow,pickup_month,pickup_is_weekend,pickup_borough_id,pickup_zone_id,pickup_service_zone_id,dropoff_borough_id,dropoff_zone_id,dropoff_service_zone_id,route_pair_id,avg_duration_7d_zone_hour,avg_fare_30d_zone,trip_count_90d_zone_hour
            - name: ALLOW_EXTRA_FEATURES
              value: 'false'
            - name: MODEL_CACHE_DIR
              value: /mlsecops/model-cache
            - name: MAX_INSTANCES_PER_REQUEST
              value: '256'
            - name: SERVE_DEPLOYMENT_NAME
              value: tabular_inference
            - name: SERVE_NUM_CPUS
              value: '0.5'
            - name: SERVE_MIN_REPLICAS
              value: '1'
            - name: SERVE_INITIAL_REPLICAS
              value: '1'
            - name: SERVE_MAX_REPLICAS
              value: '1'
            - name: SERVE_TARGET_ONGOING_REQUESTS
              value: '1'
            - name: SERVE_MAX_ONGOING_REQUESTS
              value: '2'
            - name: SERVE_UPSCALE_DELAY_S
              value: '3.0'
            - name: SERVE_DOWNSCALE_DELAY_S
              value: '60.0'
            - name: SERVE_BATCH_MAX_SIZE
              value: '16'
            - name: SERVE_BATCH_WAIT_TIMEOUT_S
              value: '0.005'
            - name: SERVE_HEALTH_CHECK_PERIOD_S
              value: '20.0'
            - name: SERVE_HEALTH_CHECK_TIMEOUT_S
              value: '40.0'
            - name: SERVE_GRACEFUL_SHUTDOWN_WAIT_LOOP_S
              value: '2.0'
            - name: SERVE_GRACEFUL_SHUTDOWN_TIMEOUT_S
              value: '20.0'
            - name: ORT_INTRA_OP_NUM_THREADS
              value: '1'
            - name: ORT_INTER_OP_NUM_THREADS
              value: '1'
            - name: ORT_LOG_SEVERITY_LEVEL
              value: '3'
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://signoz-otel-collector.signoz.svc.cluster.local:4317
            - name: OTEL_EXPORTER_OTLP_TIMEOUT
              value: '10000'
            - name: OTEL_METRIC_EXPORT_INTERVAL_MS
              value: '15000'
            - name: OTEL_METRIC_EXPORT_TIMEOUT_MS
              value: '10000'
            - name: LOG_LEVEL
              value: WARNING
            - name: SLOW_REQUEST_MS
              value: '100.0'
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: AWS_SECRET_ACCESS_KEY
            - name: USE_IAM
              value: 'false'
            startupProbe:
              exec:
                command:
                - /bin/bash
                - -lc
                - timeout 10s ray health-check --address "${RAY_ADDRESS}" >/dev/null
                  2>&1
              initialDelaySeconds: 0
              timeoutSeconds: 12
              periodSeconds: 5
              failureThreshold: 60
              successThreshold: 1
            readinessProbe:
              exec:
                command:
                - /bin/bash
                - -lc
                - timeout 10s ray health-check --address "${RAY_ADDRESS}" >/dev/null
                  2>&1
              initialDelaySeconds: 0
              timeoutSeconds: 12
              periodSeconds: 5
              failureThreshold: 12
              successThreshold: 1
            livenessProbe:
              exec:
                command:
                - /bin/bash
                - -lc
                - timeout 10s ray health-check --address "${RAY_ADDRESS}" >/dev/null
                  2>&1
              initialDelaySeconds: 0
              timeoutSeconds: 12
              periodSeconds: 10
              failureThreshold: 12
              successThreshold: 1
    workerGroupSpecs:
    - groupName: inference-workers
      replicas: 1
      minReplicas: 1
      maxReplicas: 1
      rayStartParams:
        num-cpus: '1'
      template:
        spec:
          securityContext: *id001
          terminationGracePeriodSeconds: 30
          volumes: *id002
          containers:
          - name: ray-worker
            image: ghcr.io/athithya-sakthivel/tabular-inference-service:2026-04-15-06-12--b2617e3@sha256:3615562548755e906ad17945518267cfadbac7bdaacc5a76fc6ebd4dfbcfd6f4
            imagePullPolicy: IfNotPresent
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                - ALL
              readOnlyRootFilesystem: true
            resources:
              requests:
                cpu: '1'
                memory: 2536Mi
              limits:
                cpu: '1'
                memory: 2536Mi
            volumeMounts:
            - name: model-cache
              mountPath: /mlsecops
            - name: tmp
              mountPath: /tmp
            env: *id003
            startupProbe:
              exec:
                command:
                - /bin/bash
                - -lc
                - timeout 10s ray health-check --address "${RAY_ADDRESS}" >/dev/null
                  2>&1
              initialDelaySeconds: 0
              timeoutSeconds: 12
              periodSeconds: 5
              failureThreshold: 60
              successThreshold: 1
            readinessProbe:
              exec:
                command:
                - /bin/bash
                - -lc
                - "timeout 10s ray health-check --address \"${RAY_ADDRESS}\" >/dev/null\
                  \ 2>&1 && python3 - <<'PY'\nimport json\nimport urllib.request\n\
                  \ntry:\n    with urllib.request.urlopen('http://127.0.0.1:8000/healthz',\
                  \ timeout=10) as resp:\n        body = resp.read().decode(\"utf-8\"\
                  , \"ignore\")\nexcept Exception:\n    raise SystemExit(1)\n\ntry:\n\
                  \    payload = json.loads(body)\nexcept Exception:\n    raise SystemExit(1)\n\
                  \nraise SystemExit(0 if payload.get('status') == 'ok' else 1)\n\
                  PY"
              initialDelaySeconds: 0
              timeoutSeconds: 20
              periodSeconds: 5
              failureThreshold: 12
              successThreshold: 1
            livenessProbe:
              exec:
                command:
                - /bin/bash
                - -lc
                - timeout 10s ray health-check --address "${RAY_ADDRESS}" >/dev/null
                  2>&1
              initialDelaySeconds: 0
              timeoutSeconds: 12
              periodSeconds: 10
              failureThreshold: 12
              successThreshold: 1
  serveConfigV2: "proxy_location: EveryNode\nhttp_options:\n  host: 0.0.0.0\n  port:\
    \ 8000\napplications:\n  - name: tabular_inference\n    route_prefix: /\n    import_path:\
    \ service:app\n"
