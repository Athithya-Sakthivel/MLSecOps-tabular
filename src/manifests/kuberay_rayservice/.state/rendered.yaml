    app.kubernetes.io/component: inference
---
apiVersion: ray.io/v1
kind: RayService
metadata:
  name: tabular-inference
  namespace: inference
  labels:
    app.kubernetes.io/name: tabular-inference
    app.kubernetes.io/managed-by: inference-service
    app.kubernetes.io/component: inference
  annotations:
    inference-service.io/rendered-sha256: 3dddfdd97d419b2d259a81799d70c49c145c7d41a9373a8e859cdd5ebf7a26a5
spec:
  serviceUnhealthySecondThreshold: 300
  deploymentUnhealthySecondThreshold: 300
  rayClusterConfig:
    rayVersion: 2.54.1
    enableInTreeAutoscaling: true
    autoscalerOptions:
      version: v2
      idleTimeoutSeconds: 60
    headGroupSpec:
      serviceType: ClusterIP
      rayStartParams:
        dashboard-host: 0.0.0.0
        include-dashboard: 'true'
        num-cpus: '0'
      template:
        spec:
          securityContext: &id001
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
          terminationGracePeriodSeconds: 30
          volumes: &id002
          - name: model-cache
            emptyDir: {}
