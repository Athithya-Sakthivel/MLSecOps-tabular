rules:
  - id: elt.security.dynamic-spark-sql-interpolation
    message: >
      Spark SQL is being built with interpolation, formatting, or concatenation.
      Keep SQL text static and whitelist identifiers before assembling queries.
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      technology: ["python", "pyspark", "flyte", "iceberg"]
      confidence: high
      impact: high
      cwe: "CWE-89"
      tags: ["sql-injection", "dynamic-sql", "spark"]
    paths:
      include:
        - "src/workflows/ELT/**/*.py"
    pattern-either:
      - pattern: $DB.sql(f"...{...}...")
      - pattern: $DB.sql("...".format(...))
      - pattern: $DB.sql("..." + ...)
      - pattern: $DB.sql("..." % ...)

  - id: elt.security.secret-value-in-logs
    message: >
      A secret or token derived from environment configuration is flowing into logs.
      Do not log access keys, session tokens, or other credential material.
    severity: ERROR
    mode: taint
    languages: [python]
    metadata:
      category: security
      technology: ["python", "flyte"]
      confidence: high
      impact: high
      cwe: "CWE-532"
      tags: ["secrets", "logging", "credential-leak"]
    paths:
      include:
        - "src/workflows/ELT/**/*.py"
    pattern-sources:
      - pattern: os.environ.get("AWS_SECRET_ACCESS_KEY", ...)
        exact: true
      - pattern: os.getenv("AWS_SECRET_ACCESS_KEY", ...)
        exact: true
      - pattern: os.environ.get("AWS_SESSION_TOKEN", ...)
        exact: true
      - pattern: os.getenv("AWS_SESSION_TOKEN", ...)
        exact: true
      - pattern: os.environ.get("HF_TOKEN", ...)
        exact: true
      - pattern: os.getenv("HF_TOKEN", ...)
        exact: true
      - pattern: os.environ.get("HUGGINGFACE_HUB_TOKEN", ...)
        exact: true
      - pattern: os.getenv("HUGGINGFACE_HUB_TOKEN", ...)
        exact: true
    pattern-sinks:
      - pattern: LOG.info(...)
      - pattern: LOG.warning(...)
      - pattern: LOG.error(...)
      - pattern: log_json(...)
      - pattern: print(...)

  - id: elt.iceberg.full-table-overwrite
    message: >
      Full-table Iceberg overwrite detected. This is destructive and should only be used
      for an explicitly approved full-refresh path.
    severity: ERROR
    languages: [python]
    metadata:
      category: iceberg-safety
      technology: ["python", "pyspark", "iceberg", "flyte"]
      confidence: high
      impact: high
      cwe: "CWE-732"
      tags: ["iceberg", "overwrite", "destructive-write", "data-loss"]
    paths:
      include:
        - "src/workflows/ELT/**/*.py"
    patterns:
      - pattern-either:
          - pattern: $WRITER.overwrite(F.lit(True))
          - pattern: $WRITER.overwrite(True)

  - id: elt.iceberg.expire-snapshots-outside-maintenance
    message: >
      Iceberg snapshot expiration is a destructive maintenance operation. Keep it isolated
      to the approved maintenance workflow.
    severity: ERROR
    languages: [python]
    metadata:
      category: iceberg-safety
      technology: ["python", "pyspark", "iceberg"]
      confidence: high
      impact: high
      tags: ["snapshot-expiration", "maintenance", "rollback-risk"]
    paths:
      include:
        - "src/workflows/ELT/**/*.py"
      exclude:
        - "src/workflows/ELT/tasks/maintenance_optimize.py"
    patterns:
      - pattern-either:
          - pattern: execute_sql_action($SPARK, expire_snapshots_call(...))
          - pattern: $SPARK.sql($SQL)
      - metavariable-regex:
          metavariable: $SQL
          regex: (?s).*system\.expire_snapshots\s*\(.*\).*

  - id: elt.iceberg.remove-orphan-files-outside-maintenance
    message: >
      Iceberg orphan-file cleanup deletes storage objects that are no longer referenced
      by table metadata. Keep this limited to the approved maintenance workflow.
    severity: ERROR
    languages: [python]
    metadata:
      category: iceberg-safety
      technology: ["python", "pyspark", "iceberg"]
      confidence: high
      impact: high
      tags: ["orphan-files", "delete", "maintenance"]
    paths:
      include:
        - "src/workflows/ELT/**/*.py"
      exclude:
        - "src/workflows/ELT/tasks/maintenance_optimize.py"
    patterns:
      - pattern-either:
          - pattern: execute_sql_action($SPARK, remove_orphan_files_call(...))
          - pattern: $SPARK.sql($SQL)
      - metavariable-regex:
          metavariable: $SQL
          regex: (?s).*system\.remove_orphan_files\s*\(.*\).*

  - id: elt.iceberg.rewrite-data-files-outside-maintenance
    message: >
      Iceberg rewrite_data_files is a compaction/rewriting operation that can be expensive
      and risky if used outside the approved maintenance workflow.
    severity: ERROR
    languages: [python]
    metadata:
      category: iceberg-safety
      technology: ["python", "pyspark", "iceberg"]
      confidence: high
      impact: high
      tags: ["rewrite-data-files", "compaction", "maintenance"]
    paths:
      include:
        - "src/workflows/ELT/**/*.py"
      exclude:
        - "src/workflows/ELT/tasks/maintenance_optimize.py"
    patterns:
      - pattern-either:
          - pattern: execute_sql_action($SPARK, rewrite_data_files_call(...))
          - pattern: $SPARK.sql($SQL)
      - metavariable-regex:
          metavariable: $SQL
          regex: (?s).*system\.rewrite_data_files\s*\(.*\).*