rules:
  - id: elt.security.dynamic-spark-sql-interpolation
    message: >
      Spark SQL is being built with interpolation, formatting, concatenation, or percent formatting.
      Keep SQL text static and move all identifier handling into validated helper functions.
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      technology: ["python", "pyspark", "flyte", "iceberg"]
      confidence: high
      impact: high
      cwe: "CWE-89"
      tags: ["sql-injection", "dynamic-sql", "spark"]
    paths:
      include:
        - "src/workflows/ELT/**/*.py"
      exclude:
        - "src/workflows/ELT/tasks/maintenance_optimize.py"
    pattern-either:
      - pattern: $DB.sql(f"...{...}...")
      - pattern: $DB.sql("...".format(...))
      - pattern: $DB.sql("..." + ...)
      - pattern: $DB.sql("..." % ...)
    pattern-not-inside: |
      def ensure_namespace(...):
          ...
    pattern-not-inside: |
      def table_exists(...):
          ...
    pattern-not-inside: |
      def validate_iceberg_catalog(...):
          ...

  - id: elt.security.secret-value-in-logs
    message: >
      A secret or token derived from environment configuration is flowing into logs.
      Do not log access keys, session tokens, or Hugging Face tokens.
    severity: ERROR
    languages: [python]
    mode: taint
    metadata:
      category: security
      technology: ["python", "flyte"]
      confidence: high
      impact: high
      cwe: "CWE-532"
      tags: ["secrets", "logging", "credential-leak"]
    paths:
      include:
        - "src/workflows/ELT/**/*.py"
    pattern-sources:
      - pattern: os.environ.get("AWS_SECRET_ACCESS_KEY", ...)
        exact: true
      - pattern: os.getenv("AWS_SECRET_ACCESS_KEY", ...)
        exact: true
      - pattern: os.environ.get("AWS_SESSION_TOKEN", ...)
        exact: true
      - pattern: os.getenv("AWS_SESSION_TOKEN", ...)
        exact: true
      - pattern: os.environ.get("HF_TOKEN", ...)
        exact: true
      - pattern: os.getenv("HF_TOKEN", ...)
        exact: true
      - pattern: os.environ.get("HUGGINGFACE_HUB_TOKEN", ...)
        exact: true
      - pattern: os.getenv("HUGGINGFACE_HUB_TOKEN", ...)
        exact: true
    pattern-sinks:
      - pattern: LOG.info(...)
      - pattern: LOG.warning(...)
      - pattern: LOG.error(...)
      - pattern: log_json(...)
      - pattern: print(...)

  - id: elt.iceberg.expire-snapshots-outside-maintenance
    message: >
      Iceberg snapshot expiration is a destructive maintenance operation.
      Keep it isolated to src/workflows/ELT/tasks/maintenance_optimize.py.
    severity: ERROR
    languages: [python]
    metadata:
      category: iceberg-safety
      technology: ["python", "pyspark", "iceberg"]
      confidence: high
      impact: high
      tags: ["snapshot-expiration", "maintenance", "rollback-risk"]
    paths:
      include:
        - "src/workflows/ELT/**/*.py"
      exclude:
        - "src/workflows/ELT/tasks/maintenance_optimize.py"
    pattern: expire_snapshots_call(...)

  - id: elt.iceberg.remove-orphan-files-outside-maintenance
    message: >
      Iceberg orphan-file cleanup deletes storage objects that are no longer referenced by table metadata.
      Keep it isolated to src/workflows/ELT/tasks/maintenance_optimize.py.
    severity: ERROR
    languages: [python]
    metadata:
      category: iceberg-safety
      technology: ["python", "pyspark", "iceberg"]
      confidence: high
      impact: high
      tags: ["orphan-files", "delete", "maintenance"]
    paths:
      include:
        - "src/workflows/ELT/**/*.py"
      exclude:
        - "src/workflows/ELT/tasks/maintenance_optimize.py"
    pattern: remove_orphan_files_call(...)

  - id: elt.iceberg.rewrite-data-files-outside-maintenance
    message: >
      Iceberg rewrite_data_files is a compaction and file-rewrite operation.
      Keep it isolated to src/workflows/ELT/tasks/maintenance_optimize.py.
    severity: ERROR
    languages: [python]
    metadata:
      category: iceberg-safety
      technology: ["python", "pyspark", "iceberg"]
      confidence: high
      impact: high
      tags: ["rewrite-data-files", "compaction", "maintenance"]
    paths:
      include:
        - "src/workflows/ELT/**/*.py"
      exclude:
        - "src/workflows/ELT/tasks/maintenance_optimize.py"
    pattern: rewrite_data_files_call(...)