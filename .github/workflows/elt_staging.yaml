name: spark-image-ci

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - src/workflows/ELT/**
      - .github/workflows/spark.yaml
      - .gitleaks.toml
  pull_request:
    paths:
      - src/workflows/ELT/**
      - .github/workflows/spark.yaml
      - .gitleaks.toml

permissions:
  contents: read

concurrency:
  group: spark-image-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  scan:
    name: spark-scan
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.12.0

      - name: Run Spark CI
        env:
          PUSH_IMAGE: 'false'
        run: bash src/workflows/ELT/CI.sh

  build:
    name: spark-build-publish
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    needs: scan
    if: github.event_name == 'push' && github.ref_name == github.event.repository.default_branch

    environment: staging

    env:
      GIT_PAT: ${{ secrets.GIT_PAT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.12.0

      - name: Run Spark CI and publish image
        env:
          PUSH_IMAGE: 'true'
        run: bash src/workflows/ELT/CI.sh