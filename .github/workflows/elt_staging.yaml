name: spark-image-ci

on:
  workflow_dispatch:

  push:
    branches: [main]
    paths:
      - src/workflows/ELT/Dockerfile.flyte_task

  pull_request:
    paths:
      - src/workflows/ELT/Dockerfile.flyte_task

permissions:
  contents: read

concurrency:
  group: spark-image-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scan:
    name: spark-scan
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment: staging

    env:
      GIT_PAT: ${{ secrets.GIT_PAT }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Run Spark CI
        env:
          PUSH_IMAGE: 'false'
        run: bash src/workflows/ELT/CI_staging.sh

  build:
    name: spark-build-publish
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    needs: scan
    if: github.event_name == 'push' && github.ref_name == github.event.repository.default_branch
    environment: staging

    env:
      GIT_PAT: ${{ secrets.GIT_PAT }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Run Spark CI and publish image
        env:
          PUSH_IMAGE: 'true'
        run: bash src/workflows/ELT/CI_staging.sh