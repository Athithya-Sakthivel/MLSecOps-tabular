name: spark-image-ci

on:
  push:
    branches:
      - main
    paths:
      - "src/workflows/ELT/image/**"
  pull_request:
    paths:
      - "src/workflows/ELT/image/**"

concurrency:
  group: spark-image-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-validate:
    name: spark-image-build-and-validate
    runs-on: ubuntu-24.04

    defaults:
      run:
        shell: bash

    env:
      CI: "true"

    steps:
      - name: checkout-repository
        uses: actions/checkout@v4

      - name: validate-repo-state
        run: |
          set -euo pipefail
          test -d src/workflows/ELT/image
          test -f src/workflows/ELT/CI.sh

      - name: setup-docker-buildx
        uses: docker/setup-buildx-action@v3.12.0

      - name: ensure-ci-script-executable
        run: bash src/workflows/ELT/CI.sh
