name: full_repo_security_scan

on:
  push:
    branches:
      - "**"
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: full-repo-security-scan-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SCANNER_IMAGE: ghcr.io/athithya-sakthivel/trivy-0.69.3-gitleaks-8.30.1-opengrep-1.16.5@sha256:2d19bd7b418692a20ae57b24620da3af648878a66d582022c0721512fff1b5e2
  TRIVY_SEVERITY: HIGH,CRITICAL

jobs:
  scan_repository:
    name: Full Repository Security Scan
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Check out repository with full history
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Prepare writable cache directories
        run: |
          set -euo pipefail
          install -d -m 0777 "$RUNNER_TEMP/trivy-cache"
          install -d -m 0777 "$RUNNER_TEMP/opengrep-cache"

      - name: Run OpenGrep, Gitleaks, and Trivy
        env:
          PYTHONWARNINGS: ignore
          TRIVY_CACHE_DIR: /home/appuser/.cache/trivy
        run: |
          set -euo pipefail

          REPO_ROOT="$GITHUB_WORKSPACE"
          RULE_FILE="$REPO_ROOT/src/opengrep/mlops_sast_rules.yaml"

          if [[ ! -s "$RULE_FILE" ]]; then
            echo "::error::Missing or empty OpenGrep rules file: $RULE_FILE"
            exit 1
          fi

          docker run --rm \
            -e HOME=/home/appuser \
            -e XDG_CACHE_HOME=/home/appuser/.cache \
            -e PYTHONWARNINGS=ignore \
            -e TRIVY_SEVERITY \
            -e TRIVY_CACHE_DIR \
            -v "$REPO_ROOT:/workspace" \
            -v "$RUNNER_TEMP/trivy-cache:/home/appuser/.cache/trivy" \
            -v "$RUNNER_TEMP/opengrep-cache:/home/appuser/.cache/opengrep" \
            -w /workspace \
            --entrypoint /bin/sh \
            "$SCANNER_IMAGE" \
            -ec '
              set -eu

              echo "=== OpenGrep SAST Scan ==="
              opengrep scan \
                --config p/owasp-top-ten \
                --config p/python \
                --config p/dockerfile \
                --config p/secrets \
                --config p/docker-compose \
                --config p/kubernetes \
                --config /workspace/src/opengrep/mlops_sast_rules.yaml \
                --exclude src/manifests/iceberg/deployment.yaml \
                --error \
                .

              echo "=== Gitleaks Full History Scan ==="
              if [ -s /workspace/.gitleaks.toml ]; then
                gitleaks git \
                  --config /workspace/.gitleaks.toml \
                  --log-opts="--all --full-history" \
                  --no-banner \
                  --redact \
                  --exit-code 1
              else
                gitleaks git \
                  --log-opts="--all --full-history" \
                  --no-banner \
                  --redact \
                  --exit-code 1
              fi

              echo "=== Trivy Filesystem Scan ==="
              trivy fs \
                --cache-dir "$TRIVY_CACHE_DIR" \
                --scanners vuln,misconfig \
                --severity "$TRIVY_SEVERITY" \
                --ignore-unfixed \
                --skip-dirs .git \
                --skip-dirs src/opengrep \
                --skip-files src/manifests/iceberg/deployment.yaml \
                --exit-code 1 \
                .
            '