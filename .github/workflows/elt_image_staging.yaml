name: elt-staging

on:
  workflow_dispatch:

  push:
    branches: [main]
    paths:
      - src/workflows/ELT/tasks/**
      - src/workflows/ELT/Dockerfile.flyte_task

  pull_request:
    paths:
      - src/workflows/ELT/tasks/**
      - src/workflows/ELT/Dockerfile.flyte_task

permissions:
  contents: read

concurrency:
  group: elt-staging-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TRIVY_IMAGE: ghcr.io/athithya-sakthivel/trivy:0.69.3-safe@sha256:bcc376de8d77cfe086a917230e818dc9f8528e3c852f7b1aff648949b6258d1c
  TRIVY_CACHE_DIR: /tmp/trivy-cache

jobs:
  build-scan-push:
    name: Build, scan, publish image
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment: staging

    env:
      GIT_PAT: ${{ secrets.GIT_PAT }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Compute Trivy cache key
        id: trivy-key
        shell: bash
        run: |
          set -euo pipefail
          echo "key=trivy-${RUNNER_OS}-$(date -u +%G-%V)" >> "$GITHUB_OUTPUT"

      - name: Prepare Trivy cache
        run: mkdir -p "${TRIVY_CACHE_DIR}"

      - name: Restore Trivy cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: ${{ env.TRIVY_CACHE_DIR }}
          key: ${{ steps.trivy-key.outputs.key }}
          restore-keys: |
            trivy-${{ runner.os }}-

      - name: Compute image metadata
        id: image-meta
        run: |
          set -euo pipefail

          GHCR_USER="${GHCR_USER:-athithya-sakthivel}"
          IMAGE_NAME="${IMAGE_NAME:-flyte-elt-task}"
          IMAGE_TAG="${IMAGE_TAG:-$(TZ=Asia/Kolkata date +%Y-%m-%d-%H-%M)--$(git rev-parse --short HEAD)}"
          ELT_TASK_IMAGE="ghcr.io/${GHCR_USER}/${IMAGE_NAME}:${IMAGE_TAG}"
          IMAGE_STAGING="ghcr.io/${GHCR_USER}/${IMAGE_NAME}:staging"

          {
            echo "ghcr_user=$GHCR_USER"
            echo "image_name=$IMAGE_NAME"
            echo "image_tag=$IMAGE_TAG"
            echo "elt_task_image=$ELT_TASK_IMAGE"
            echo "image_staging=$IMAGE_STAGING"
          } >> "$GITHUB_OUTPUT"

      - name: Build image locally
        id: build-image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294
        with:
          context: ./
          file: src/workflows/ELT/Dockerfile.flyte_task
          load: true
          push: false
          pull: true
          tags: |
            ${{ steps.image-meta.outputs.elt_task_image }}
            ${{ steps.image-meta.outputs.image_staging }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image with Trivy
        run: |
          set -euo pipefail

          scan_image="${{ steps.build-image.outputs.imageid }}"
          test -n "${scan_image}"

          ignore_args=()
          if [[ -f .trivyignore ]]; then
            ignore_args+=(--ignorefile /workspace/.trivyignore)
          fi

          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${TRIVY_CACHE_DIR}:/root/.cache" \
            -v "$PWD:/workspace" \
            -w /workspace \
            "${TRIVY_IMAGE}" \
            image \
            --cache-dir /root/.cache/trivy \
            --scanners vuln \
            --severity HIGH,CRITICAL \
            --exit-on-eol 1 \
            --exit-code 1 \
            --quiet \
            "${ignore_args[@]}" \
            "${scan_image}"

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ghcr.io
          username: ${{ steps.image-meta.outputs.ghcr_user }}
          password: ${{ env.GIT_PAT }}

      - name: Push image tags
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          docker push "${{ steps.image-meta.outputs.elt_task_image }}"
          docker push "${{ steps.image-meta.outputs.image_staging }}"