name: train-image-ci

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - src/workflows/train/**
      - .github/workflows/train_staging.yaml
  pull_request:
    paths:
      - src/workflows/train/**
      - .github/workflows/train_staging.yaml

permissions:
  contents: read

concurrency:
  group: train-image-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  scan:
    name: train-scan
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment: staging

    env:
      GIT_PAT: ${{ secrets.GIT_PAT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run Train CI
        env:
          PUSH_IMAGE: 'false'
        run: bash src/workflows/train/CI.sh

  build:
    name: train-build-publish
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    needs: scan
    if: github.event_name == 'push' && github.ref_name == github.event.repository.default_branch
    environment: staging

    env:
      GIT_PAT: ${{ secrets.GIT_PAT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and publish image
        env:
          PUSH_IMAGE: 'true'
        run: bash src/workflows/train/CI_staging.sh